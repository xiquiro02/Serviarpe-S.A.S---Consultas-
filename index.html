<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Serviarpe S.A.S</title>
  <link rel="stylesheet" href="asset/estilo_principal.css" />
  <link rel="stylesheet" href="asset/utils/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- Fondo con imagen -->
  <div class="fondo"></div>

  <!-- Contenedor principal -->
  <div class="login">

    <!-- Panel izquierdo: Logo -->
    <div class="panel-logo">
      <div class="logo-circle">
        <img src="asset/imagenes/Logo_Serviarpe.png" alt="Serviarpe S.A.S ESP" class="logo-img" />
      </div>
    </div>

    <!-- Divisor vertical -->
    <div class="divider"></div>

    <!-- Panel derecho: Formulario -->
    <div class="panel-form">
      <h2 class="title">Bienvenidos a Serviarpe S.A.S</h2>
      <h3 class="form-title">Iniciar Sesión</h3>

      <form class="login-form">
        <div class="input-group">
          <input type="text" id="usuario" placeholder="Usuario" autocomplete="off" />
        </div>

        <div class="input-group">
          <input type="password" id="contrasena" placeholder="Contraseña" autocomplete="off" />
        </div>

        <p class="forgot-password">
          <a href="pages/recuperarPassword.html">¿Olvidó su contraseña?</a>
        </p>

        <a href="pages/menuPrincipal.html">
          <button type="button" class="btn-ingresar">Ingresar</button>
        </a>

        <p class="register">
          No tienes cuenta? <a href="pages/registrarse.html">Regístrate</a>
        </p>
      </form>
    </div>

  </div>

</body>
</html>
