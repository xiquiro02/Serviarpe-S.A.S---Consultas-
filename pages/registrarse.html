<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Serviarpe S.A.S - Registrarse</title>
  <link rel="stylesheet" href="../asset/css/estilos_registrarse.css" />
  <link rel="stylesheet" href="../asset/utils/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet" />
</head>
<body>

  <div class="fondo"></div>

  <div class="login">

    <div class="panel-logo">
      <div class="logo-circle">
        <img src="../asset/imagenes/Logo_Serviarpe.png" alt="Serviarpe S.A.S ESP" class="logo-img" />
      </div>
    </div>

    <div class="divider"></div>

    <div class="panel-form">
      <h3 class="form-title">Registrarse</h3>

      <form class="login-form" onsubmit="registrarse(event)">
        <div class="input-group">
          <input type="text" id="inputNombre" placeholder="Nombre completo" autocomplete="off" />
        </div>
        <div class="input-group">
          <input type="text" id="inputUsuario" placeholder="Nombre de usuario" autocomplete="off" />
        </div>
        <div class="input-group">
          <input type="email" id="inputCorreo" placeholder="Correo electrónico" autocomplete="off" />
        </div>
        <div class="input-group">
          <input type="password" id="inputPassword" placeholder="Contraseña" autocomplete="off" />
        </div>
        <div class="input-group">
          <input type="password" id="inputConfirmar" placeholder="Confirmar Contraseña" autocomplete="off" />
        </div>

        <button type="submit" class="btn-principal">Crear Cuenta</button>

        <div class="container-link">
          <p class="link-inferior">
            ← <a href="../index.html">Volver al inicio</a>
          </p>
        </div>
      </form>
    </div>

  </div>

  <script src="../node_modules/sweetalert2/dist/sweetalert2.all.min.js"></script>
  <script>if (typeof Swal === 'undefined') { var _s = require('sweetalert2'); window.Swal = _s.default || _s; }</script>
  <script src="../asset/js/registrarse.js"></script>

</body>
</html>
