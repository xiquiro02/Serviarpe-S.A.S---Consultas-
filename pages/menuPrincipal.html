<!DOCTYPE html>

<html lang="es"> <!-- Define el idioma en español -->
<head>
  <meta charset="UTF-8" /> <!-- Permite caracteres especiales -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" /> <!-- Hace que la página sea responsive -->
  <title>Serviarpe S.A.S - Dashboard</title> <!-- Título de la pestaña -->
  <link rel="stylesheet" href="../asset/utils/customProperties.css" />  <!-- Variables globales de estilos (colores, tamaños, etc.) -->
  <link rel="stylesheet" href="../asset/layout/sidebar.css" />  <!-- Estilos del menú lateral -->
  <link rel="stylesheet" href="../asset/css/estilos_menuPrincipal.css" /> <!-- Estilos específicos del dashboard -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet" />    <!-- Fuente desde Google Fonts -->
</head>

<body class="general"> <!-- Clase general para estilos globales -->

  <!-- ===== OVERLAY ===== -->
  <div class="overlay" id="overlay" onclick="cerrarMenu()"></div> <!-- Fondo oscuro que aparece cuando el menú está abierto -->

  <!-- ===== SIDEBAR (MENÚ LATERAL) ===== -->
  <aside class="sidebar" id="sidebar">
    <!-- Encabezado del sidebar -->
    <div class="sidebar-header">
      <img src="../asset/imagenes/logo_serviarpe.png" alt="Logo" />
      <span class="sidebar-nombre">SERVIARPE S.A.S ESP</span>
    </div>
    <!-- Sección GENERAL -->
    <p class="sidebar-seccion">GENERAL</p>
    <nav class="sidebar-nav">
      <!-- Opción activa -->
      <a href="#" class="nav-item active">
        <span class="nav-icon">🏠</span> Inicio
      </a>
      <!-- Enlace a buscar personal -->
      <a href="buscarPersonal.html" class="nav-item">
        <span class="nav-icon">👤</span> Buscar personal
      </a>
    </nav>
    <!-- Sección LIBROS -->
    <p class="sidebar-seccion">LIBROS</p>
    <nav class="sidebar-nav" id="sidebarLibros">
    </nav>
    <!-- Sección ADMINISTRAR -->
    <p class="sidebar-seccion">ADMINISTRAR</p>
    <nav class="sidebar-nav">

      <!-- Gestión de usuarios -->
      <a href="administrarUsuarios.html" class="nav-item">
        <span class="nav-icon">👥</span> Usuarios
      </a>

      <!-- Gestión de libros -->
      <a href="administrarLibros.html" class="nav-item">
        <span class="nav-icon">📚</span> Libros
      </a>

      <!-- Gestión de cajas -->
      <a href="administrarCajas.html" class="nav-item">
        <span class="nav-icon">📦</span> Cajas
      </a>

      <!-- Gestión de años -->
      <a href="administrarYears.html" class="nav-item">
        <span class="nav-icon">📅</span> Años
      </a>
    </nav>
    <!-- Footer del sidebar (perfil de usuario) -->
    <a href="perfil.html" class="sidebar-footer">
      <span class="user-icon">👤</span>
      <span class="user-nombre">Administrador</span>
      <!-- Aquí podrías luego poner el nombre dinámico -->
    </a>
  </aside>

  <!-- ===== CONTENIDO PRINCIPAL ===== -->
  <div class="main">

    <!-- Encabezado superior -->
    <header class="topbar">
      <div class="topbar-center">
        <img src="../asset/imagenes/logo_serviarpe.png" alt="Logo" class="topbar-logo" />  <!-- Logo -->
        <h1 class="topbar-title">SERVIARPE S.A.S ESP</h1>  <!-- Título -->
      </div>
    </header>

    <!-- CONTENIDO -->
    <main class="contenido">

      <!-- Botón hamburguesa (para abrir/cerrar menú) -->
      <button class="hamburger" id="btnMenu" onclick="toggleMenu()">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <!-- Tarjetas de resumen -->
      <div class="resumen">

        <!-- Tarjeta azul -->
        <div class="card-resumen azul">
          <span class="card-numero" id="numCarpetas">—</span>
          <span class="card-label">Total de Carpetas</span>
        </div>

        <!-- Tarjeta verde -->
        <div class="card-resumen verde">
          <span class="card-numero" id="numCajas">—</span>
          <span class="card-label">Total de Cajas</span>
        </div>

        <!-- Tarjeta naranja -->
        <div class="card-resumen naranja">
          <span class="card-numero" id="rangoAnios">—</span>
          <span class="card-label">Años</span>
        </div>
      </div>

      <!-- Grid de libros -->
      <div class="libros-grid" id="librosGrid">
      </div>

    </main>
  </div>

  <script src="../asset/js/hamburger.js"></script>
  <script src="../asset/js/menuPrincipal.js"></script>

</body>
</html>
