<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Serviarpe S.A.S - Nuevo Registro</title>
  <link rel="stylesheet" href="../asset/utils/customProperties.css" />
  <link rel="stylesheet" href="../asset/layout/sidebar.css" />
  <link rel="stylesheet" href="../asset/layout/components.css" />
  <link rel="stylesheet" href="../asset/css/estilos_nuevoRegistro.css" />
</head>
<body>

  <!-- OVERLAY -->
  <div class="overlay" id="overlay" onclick="cerrarMenu()"></div>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <img src="../asset/imagenes/Logo_Serviarpe.png" alt="Logo" />
      <span class="sidebar-nombre">SERVIARPE S.A.S ESP</span>
    </div>

    <p class="sidebar-seccion">GENERAL</p>
    <nav class="sidebar-nav">
      <a href="menuPrincipal.html" class="nav-item">
        <span class="nav-icon">🏠</span> Inicio
      </a>
      <a href="buscarPersonal.html" class="nav-item">
        <span class="nav-icon">👤</span> Buscar personal
      </a>
    </nav>

    <p class="sidebar-seccion">LIBROS</p>
    <nav class="sidebar-nav" id="sidebarLibros"></nav>

    <p class="sidebar-seccion">ADMINISTRAR</p>
    <nav class="sidebar-nav">
      <a href="administrarUsuarios.html" class="nav-item">
        <span class="nav-icon">👥</span> Usuarios
      </a>
      <a href="administrarLibros.html" class="nav-item">
        <span class="nav-icon">📚</span> Libros
      </a>
      <a href="administrarCajas.html" class="nav-item">
        <span class="nav-icon">📦</span> Cajas
      </a>
      <a href="administrarYears.html" class="nav-item">
        <span class="nav-icon">📅</span> Años
      </a>
    </nav>

    <a href="perfil.html" class="sidebar-footer">
      <span class="user-icon">👤</span>
      <span class="user-nombre">Administrador</span>
    </a>
  </aside>

  <!-- CONTENIDO PRINCIPAL -->
  <div class="main">

    <header class="topbar">
      <div class="topbar-center">
        <img src="../asset/imagenes/Logo_Serviarpe.png" alt="Logo" class="topbar-logo" />
        <h1 class="topbar-title">SERVIARPE S.A.S ESP</h1>
      </div>
    </header>

    <main class="contenido">

      <button class="hamburger" id="btnMenu" onclick="toggleMenu()">
        <span></span><span></span><span></span>
      </button>

      <div class="nuevo-header">
        <div class="nuevo-header-info">
          <span class="nuevo-icono">➕</span>
          <div>
            <p class="nuevo-subtitulo" id="nuevo-subtitulo">Libro</p>
            <h2 class="nuevo-titulo-text">Nuevo Registro</h2>
          </div>
        </div>
        <a href="vistaLibros.html" class="btn-volver">&#8592; Volver</a>
      </div>

      <div class="nuevo-card">
        <h3 class="nuevo-titulo">Datos del registro</h3>
        <form class="nuevo-form" onsubmit="crearRegistro(event)">

          <div class="nuevo-grid">
            <div class="form-grupo">
              <label class="form-label" for="inputNombre">Nombre completo</label>
              <input type="text" id="inputNombre" class="form-input" placeholder="Nombre completo del empleado" />
            </div>
            <div class="form-grupo">
              <label class="form-label" for="inputCedula">Cédula</label>
              <input type="text" id="inputCedula" class="form-input" placeholder="Número de cédula" />
            </div>
            <div class="form-grupo">
              <label class="form-label" for="inputCargo">Cargo</label>
              <input type="text" id="inputCargo" class="form-input" placeholder="Cargo del empleado" />
            </div>
            <div class="form-grupo">
              <label class="form-label" for="inputPosicion">Posición en el libro</label>
              <input type="text" id="inputPosicion" class="form-input" placeholder="Ej: Posición 5" />
            </div>
            <div class="form-grupo">
              <label class="form-label" for="selectCaja">Caja</label>
              <select id="selectCaja" class="form-input">
                <option value="">— Sin caja —</option>
              </select>
            </div>
            <div class="form-grupo">
              <label class="form-label" for="selectAnio">Año</label>
              <select id="selectAnio" class="form-input">
                <option value="">— Sin año —</option>
              </select>
            </div>
          </div>

          <div class="nuevo-acciones">
            <a href="vistaLibros.html" class="btn-cancelar" id="btnCancelar">Cancelar</a>
            <button type="submit" class="btn-crear">Crear registro</button>
          </div>

        </form>
      </div>

    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="../asset/js/hamburger.js"></script>
  <script src="../asset/js/sidebar.js"></script>
  <script src="../asset/js/nuevoRegistro.js"></script>

</body>
</html>
