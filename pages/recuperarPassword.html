<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Serviarpe S.A.S - Recuperar Contraseña</title>
  <link rel="stylesheet" href="../asset/css/estilos_recuperarPassword.css" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- Fondo -->
  <div class="fondo"></div>

  <!-- Modal -->
  <div class="login">

    <!-- Panel izquierdo: Logo -->
    <div class="panel-logo">
      <div class="logo-circle">
        <img src="../asset/imagenes/Logo_Serviarpe.png" alt="Serviarpe S.A.S ESP" class="logo-img" />
      </div>
    </div>

    <!-- Divisor -->
    <div class="divider"></div>

    <!-- Panel derecho: Formulario -->
    <div class="panel-form">
      <h3 class="form-title">Recuperar Contraseña</h3>

      <p class="descripcion">
        Ingresa tu correo electrónico y te enviaremos un enlace para
        restablecer tu contraseña. Sigue las instrucciones del mensaje
        para crear una nueva contraseña segura.
      </p>

      <form class="login-form">
        <div class="input-group">
          <input type="email" placeholder="Correo electrónico" autocomplete="off" />
        </div>

        <button type="submit" class="btn-principal">Enviar</button>

        <div class="container-link">
            <p class="link-inferior">
                ← <a href="index.html">Volver al inicio</a>
              </p>
        </div>
      </form>
    </div>

  </div>

</body>
</html>
