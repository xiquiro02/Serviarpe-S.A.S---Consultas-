<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Serviarpe S.A.S - Recuperar Contraseña</title>
  <link rel="stylesheet" href="../asset/css/estilos_recuperarPassword.css" />
  <link rel="stylesheet" href="../asset/utils/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    .mensaje { text-align: center; font-size: 13px; margin-top: 4px; min-height: 18px; }
    .mensaje.error  { color: #c0392b; }
    .mensaje.exito  { color: #27ae60; }
    .btn-secundario {
      background: none; border: none; color: var(--color-verde-principal);
      font-size: 13px; cursor: pointer; text-decoration: underline; padding: 0;
    }
    .btn-principal:disabled { opacity: 0.6; cursor: not-allowed; }
  </style>
</head>
<body>

  <div class="fondo"></div>

  <div class="login">

    <div class="panel-logo">
      <div class="logo-circle">
        <img src="../asset/imagenes/Logo_Serviarpe.png" alt="Serviarpe S.A.S ESP" class="logo-img" />
      </div>
    </div>

    <div class="divider"></div>

    <div class="panel-form">
      <h3 class="form-title">Recuperar Contraseña</h3>

      <!-- Mensaje global (éxito / error) -->
      <p id="mensaje" class="mensaje"></p>

      <!-- PASO 1: ingresar correo -->
      <div id="paso-1">
        <p class="descripcion">
          Ingresa tu correo electrónico y te enviaremos un código de verificación
          de 6 dígitos para restablecer tu contraseña.
        </p>

        <form class="login-form" onsubmit="event.preventDefault(); enviarCodigo()">
          <div class="input-group">
            <input type="email" id="correo" placeholder="Correo electrónico" autocomplete="off" />
          </div>

          <button type="submit" id="btn-enviar" class="btn-principal">Enviar código</button>

          <div class="container-link">
            <p class="link-inferior">
              ← <a href="../index.html">Volver al inicio</a>
            </p>
          </div>
        </form>
      </div>

      <!-- PASO 2: ingresar código y nueva contraseña -->
      <div id="paso-2" style="display:none;">
        <p class="descripcion">
          Ingresa el código de 6 dígitos que enviamos a tu correo y elige una nueva contraseña.
        </p>

        <form class="login-form" onsubmit="event.preventDefault(); cambiarPassword()">
          <div class="input-group">
            <input type="text" id="codigo" placeholder="Código de verificación" maxlength="6" autocomplete="off" />
          </div>
          <div class="input-group">
            <input type="password" id="nueva-password" placeholder="Nueva contraseña" />
          </div>
          <div class="input-group">
            <input type="password" id="confirmar-password" placeholder="Confirmar nueva contraseña" />
          </div>

          <button type="submit" class="btn-principal">Cambiar contraseña</button>

          <div class="container-link">
            <button type="button" class="btn-secundario" onclick="reenviarCodigo()">Reenviar código</button>
          </div>
        </form>
      </div>

    </div>

  </div>

  <script src="../asset/js/recuperarPassword.js"></script>
</body>
</html>
