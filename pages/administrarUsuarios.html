<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Serviarpe S.A.S - Administrar Usuarios</title>
  <link rel="stylesheet" href="../asset/utils/customProperties.css" />
  <link rel="stylesheet" href="../asset/layout/sidebar.css" />
  <link rel="stylesheet" href="../asset/layout/components.css" />
  <link rel="stylesheet" href="../asset/css/estilos_administrarUsuarios.css" />
</head>
<body>

  <!-- OVERLAY -->
  <div class="overlay" id="overlay" onclick="cerrarMenu()"></div>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <img src="../asset/imagenes/logo_serviarpe.png" alt="Logo" />
      <span class="sidebar-nombre">SERVIARPE S.A.S ESP</span>
    </div>

    <p class="sidebar-seccion">GENERAL</p>
    <nav class="sidebar-nav">
      <a href="menuPrincipal.html" class="nav-item">
        <span class="nav-icon">🏠</span> Inicio
      </a>
      <a href="buscarPersonal.html" class="nav-item">
        <span class="nav-icon">👤</span> Buscar personal
      </a>
    </nav>

    <p class="sidebar-seccion">ADMINISTRAR</p>
    <nav class="sidebar-nav">
      <a href="administrarUsuarios.html" class="nav-item active">
        <span class="nav-icon">👥</span> Usuarios
      </a>
      <a href="administrarLibros.html" class="nav-item">
        <span class="nav-icon">📚</span> Libros
      </a>
      <a href="administrarCajas.html" class="nav-item">
        <span class="nav-icon">📦</span> Cajas
      </a>
      <a href="administrarYears.html" class="nav-item">
        <span class="nav-icon">📅</span> Años
      </a>
    </nav>

    <p class="sidebar-seccion">LIBROS</p>
    <nav class="sidebar-nav" id="sidebarLibros"></nav>

    <a href="perfil.html" class="sidebar-footer">
      <span class="user-icon">👤</span>
      <span class="user-nombre">Administrador</span>
    </a>
  </aside>

  <!-- MAIN -->
  <div class="main">

    <header class="topbar">
      <div class="topbar-center">
        <img src="../asset/imagenes/logo_serviarpe.png" alt="Logo" class="topbar-logo" />
        <h1 class="topbar-title">SERVIARPE S.A.S ESP</h1>
      </div>
    </header>

    <main class="contenido">

      <button class="hamburger" id="btnMenu" onclick="toggleMenu()">
        <span></span><span></span><span></span>
      </button>

      <a href="menuPrincipal.html" class="btn-volver">&#8592; Volver</a>

      <div class="admin-card">
        <div class="card-header">
          <div class="card-header-izq">
            <span class="card-icono">👥</span>
            <h2 class="card-titulo">Usuarios</h2>
          </div>
          <button class="btn-nuevo" onclick="abrirModalNuevo()">
            <span class="btn-nuevo-icono">+</span> Nuevo usuario
          </button>
        </div>

        <div class="tabla-wrapper">
          <table class="tabla" id="tablaUsuarios">
            <thead>
              <tr>
                <th>ID</th>
                <th>Usuario</th>
                <th>Correo</th>
                <th>Rol</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <!-- MODAL NUEVO / EDITAR -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-titulo" id="modalTitulo">Nuevo usuario</h3>
        <button class="modal-cerrar" onclick="cerrarModal()">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">Nombre completo</label>
          <input type="text" class="form-input" id="inputNombre" placeholder="Ej: Juan Pérez" />
        </div>
        <div class="form-group">
          <label class="form-label">Nombre de usuario</label>
          <input type="text" class="form-input" id="inputUsuario" placeholder="Ej: jperez" />
        </div>
        <div class="form-group">
          <label class="form-label">Correo electrónico</label>
          <input type="email" class="form-input" id="inputCorreo" placeholder="Ej: usuario@serviarpe.com" />
        </div>
        <div class="form-group">
          <label class="form-label">Rol</label>
          <select class="form-select" id="inputRol">
            <option value="administrador">Administrativo</option>
            <option value="empleado">Empleado</option>
          </select>
        </div>
        <div class="form-group" id="grupoPassword">
          <label class="form-label">Contraseña</label>
          <input type="password" class="form-input" id="inputPassword" placeholder="Mínimo 6 caracteres" />
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-cancelar" onclick="cerrarModal()">Cancelar</button>
        <button class="btn-guardar" id="btnGuardar" onclick="guardarUsuario()">Guardar</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="../asset/js/hamburger.js"></script>
  <script src="../asset/js/sidebar.js"></script>
  <script src="../asset/js/administrarUsuarios.js"></script>

</body>
</html>
